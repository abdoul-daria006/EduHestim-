<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduHestim - Connexion</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #003d82 0%, #002a5c 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: white;
            border-radius: 16px;
            padding: 50px 40px;
            width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .logo { text-align: center; margin-bottom: 35px; }
        .logo-icon { font-size: 3em; display: block; margin-bottom: 10px; }
        .logo h1 { color: #003d82; font-size: 2em; font-weight: 700; }
        .logo p { color: #666; font-size: 0.9em; margin-top: 5px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; color: #333; font-weight: 600; margin-bottom: 8px; font-size: 0.9em; }
        input { width: 100%; padding: 14px 16px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 1em; transition: border-color 0.3s; outline: none; }
        input:focus { border-color: #003d82; }
        .btn-login {
            width: 100%; padding: 15px;
            background: linear-gradient(135deg, #003d82, #002a5c);
            color: white; border: none; border-radius: 10px;
            font-size: 1.05em; font-weight: 700; cursor: pointer;
            transition: all 0.3s; margin-top: 10px;
        }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(0,61,130,0.3); }
        .btn-login:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }
        .error-msg {
            background: #ffebee; color: #c62828;
            padding: 12px 16px; border-radius: 8px;
            font-size: 0.9em; margin-bottom: 20px;
            display: none; border-left: 4px solid #c62828;
        }
        .error-msg.show { display: block; }
        .demo-accounts { margin-top: 25px; padding-top: 20px; border-top: 2px solid #f0f0f0; }
        .demo-accounts p { color: #999; font-size: 0.8em; text-align: center; margin-bottom: 12px; font-weight: 600; }
        .demo-btn {
            width: 100%; padding: 10px; border: 2px solid #e0e0e0;
            border-radius: 8px; background: #f8f9fa; cursor: pointer;
            font-size: 0.85em; margin-bottom: 8px; transition: all 0.2s;
            text-align: left; color: #333;
        }
        .demo-btn:hover { border-color: #003d82; background: #e3f2fd; }
        .demo-btn span { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 0.8em; font-weight: 600; margin-right: 8px; }
        .role-admin   { background: #ffebee; color: #c62828; }
        .role-teacher { background: #e8f5e9; color: #2e7d32; }
        .role-student { background: #e3f2fd; color: #1565c0; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">
            <span class="logo-icon">📚</span>
            <h1>EduHestim</h1>
            <p>Plateforme de gestion scolaire</p>
        </div>

        <div class="error-msg" id="errorMsg"></div>

        <div class="form-group">
            <label>Adresse Email</label>
            <input type="email" id="email" placeholder="votre@email.com" />
        </div>
        <div class="form-group">
            <label>Mot de passe</label>
            <input type="password" id="password" placeholder="••••••••" />
        </div>

        <button class="btn-login" id="btnLogin" onclick="handleLogin()">
            🔐 Se connecter
        </button>

        <div class="demo-accounts">
            <p>— Comptes de démonstration —</p>
            <button class="demo-btn" onclick="fillDemo('admin@hestim.ma', 'admin123')">
                <span class="role-admin">Admin</span> admin@hestim.ma
            </button>
            <button class="demo-btn" onclick="fillDemo('maurane.bethio@hestim.ma', '123456')">
                <span class="role-teacher">Enseignant</span> maurane.bethio@hestim.ma
            </button>
            <button class="demo-btn" onclick="fillDemo('maurane.alliman@hestim.ma', '123456')">
                <span class="role-student">Étudiant</span> maurane.alliman@hestim.ma
            </button>
        </div>
    </div>

    <script src="api.js"></script>
    <script>
        // ✅ FIX: isAuthenticated() → isLoggedIn()
        if (authSystem.isLoggedIn()) {
            const user = authSystem.getCurrentUser();
            if (user) redirectByRole(user.role);
        }

        function fillDemo(email, password) {
            document.getElementById('email').value    = email;
            document.getElementById('password').value = password;
        }

        async function handleLogin() {
            const email    = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const btn      = document.getElementById('btnLogin');
            const errorMsg = document.getElementById('errorMsg');

            errorMsg.classList.remove('show');

            if (!email || !password) {
                showError('Veuillez remplir tous les champs');
                return;
            }

            btn.disabled    = true;
            btn.textContent = '⏳ Connexion...';

            try {
                const user = await authSystem.login(email, password);
                redirectByRole(user.role);
            } catch (err) {
                showError(err.message || 'Email ou mot de passe incorrect');
                btn.disabled    = false;
                btn.textContent = '🔐 Se connecter';
            }
        }

        function redirectByRole(role) {
            const pages = {
                'administrateur': 'admindash.html',
                'enseignant':     'Enseignantdash.html',
                'etudiant':       'Etudiantdash.html'
            };
            window.location.href = pages[role] || 'index.html';
        }

        function showError(msg) {
            const el = document.getElementById('errorMsg');
            el.textContent = msg;
            el.classList.add('show');
        }

        document.addEventListener('keydown', e => {
            if (e.key === 'Enter') handleLogin();
        });
    </script>
</body>
</html>
