<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mes Réservations - EduHestim</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; display: flex; min-height: 100vh; }
        .sidebar { width: 260px; background: linear-gradient(180deg, #003d82 0%, #002a5c 100%); color: white; position: fixed; height: 100vh; display: flex; flex-direction: column; }
        .logo-section { padding: 25px 20px; border-bottom: 2px solid rgba(255,255,255,0.1); display: flex; align-items: center; gap: 12px; }
        .logo-img { width: 45px; height: 45px; background: white; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.5em; }
        .logo-text { font-size: 1.4em; font-weight: 700; }
        .nav-menu { flex: 1; padding: 20px 0; }
        .nav-item { padding: 14px 20px; color: rgba(255,255,255,0.7); cursor: pointer; transition: all 0.3s; font-size: 0.95em; }
        .nav-item:hover { background: rgba(255,255,255,0.1); color: white; }
        .nav-item.active { background: #c1002a; color: white; }
        /* ✅ logout section ajouté */
        .logout-section { padding: 20px; border-top: 2px solid rgba(255,255,255,0.1); }
        .btn-logout { width: 100%; padding: 12px; background: #c1002a; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; transition: all 0.2s; }
        .btn-logout:hover { background: #900021; }
        .main-content { margin-left: 260px; flex: 1; display: flex; flex-direction: column; }
        .top-bar { background: white; padding: 20px 35px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center; }
        .page-title { font-size: 1.8em; color: #003d82; font-weight: 700; }
        .btn-new { padding: 10px 20px; background: #003d82; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; text-decoration: none; font-size: 0.9em; transition: all 0.2s; }
        .btn-new:hover { background: #002a5c; }
        .content-area { padding: 30px 35px; overflow-y: auto; }
        .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 25px; }
        .stat-box { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); text-align: center; }
        .stat-num { font-size: 2em; font-weight: 700; color: #003d82; }
        .stat-label { color: #666; font-size: 0.85em; margin-top: 4px; }
        .filter-bar { background: white; padding: 15px 20px; border-radius: 10px; margin-bottom: 20px; display: flex; gap: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .tab { padding: 9px 18px; background: #f0f0f0; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; transition: all 0.2s; font-size: 0.9em; }
        .tab.active { background: #003d82; color: white; }
        .reservations-list { display: flex; flex-direction: column; gap: 15px; }
        .reservation-card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); border-left: 4px solid #ffa500; transition: all 0.2s; }
        .reservation-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.12); }
        .reservation-card.approuve { border-left-color: #2e7d32; }
        .reservation-card.refuse   { border-left-color: #c62828; }
        .reservation-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; }
        .reservation-salle { font-size: 1.2em; color: #003d82; font-weight: 700; margin-bottom: 4px; }
        .date-soumis { color: #aaa; font-size: 0.82em; }
        .status-badge { padding: 6px 14px; font-size: 0.83em; font-weight: 700; border-radius: 20px; }
        .badge-en-attente { background: #fff3cd; color: #856404; }
        .badge-approuve   { background: #d4edda; color: #155724; }
        .badge-refuse     { background: #f8d7da; color: #721c24; }
        .reservation-details { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin: 15px 0; padding: 15px; background: #f8f9fa; border-radius: 8px; }
        .detail-item { display: flex; flex-direction: column; gap: 3px; }
        .detail-label { color: #888; font-size: 0.75em; font-weight: 700; text-transform: uppercase; }
        .detail-value { color: #003d82; font-weight: 600; font-size: 0.92em; }
        .reservation-motif { color: #555; font-size: 0.9em; line-height: 1.5; }
        .commentaire-admin { margin-top: 12px; padding: 12px 15px; border-radius: 8px; font-size: 0.9em; display: flex; align-items: flex-start; gap: 8px; }
        .commentaire-admin.approved { background: #e8f5e9; color: #2e7d32; border-left: 3px solid #2e7d32; }
        .commentaire-admin.rejected { background: #ffebee; color: #c62828; border-left: 3px solid #c62828; }
        .traite-par { margin-top: 5px; color: inherit; opacity: 0.7; font-size: 0.82em; }
        .empty-state { text-align: center; padding: 60px 20px; color: #aaa; background: white; border-radius: 12px; }
        @media (max-width: 768px) { .stats-row { grid-template-columns: repeat(2,1fr); } .reservation-details { grid-template-columns: repeat(2,1fr); } }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo-section">
            <div class="logo-img">📚</div>
            <div class="logo-text">EduHestim</div>
        </div>
        <div class="nav-menu">
            <div class="nav-item" onclick="navigateTo('Enseignantdash.html')">📊 Dashboard</div>
            <div class="nav-item" onclick="navigateTo('EmploiedutempsEnseignant.html')">📅 Emploi du Temps</div>
            <div class="nav-item" onclick="navigateTo('FairedesdemandesEnseignant.html')">📋 Faire une Demande</div>
            <div class="nav-item active">🏫 Mes Réservations</div>
            <div class="nav-item" onclick="navigateTo('NotifEnseignant.html')">🔔 Notifications</div>
            <div class="nav-item" onclick="navigateTo('ProfilEnseignant.html')">👤 Mon Profil</div>
        </div>
        <!-- ✅ Bouton déconnexion ajouté -->
        <div class="logout-section">
            <button class="btn-logout" onclick="authSystem.logout()">🚪 Déconnexion</button>
        </div>
    </div>

    <div class="main-content">
        <div class="top-bar">
            <h1 class="page-title">🏫 Mes Réservations</h1>
            <a href="FairedesdemandesEnseignant.html" class="btn-new">➕ Nouvelle Demande</a>
        </div>
        <div class="content-area">

            <div class="stats-row">
                <div class="stat-box">
                    <div class="stat-num" id="totalCount">—</div>
                    <div class="stat-label">Total</div>
                </div>
                <div class="stat-box">
                    <div class="stat-num" style="color:#856404" id="enAttenteCount">—</div>
                    <div class="stat-label">En attente</div>
                </div>
                <div class="stat-box">
                    <div class="stat-num" style="color:#2e7d32" id="approuveesCount">—</div>
                    <div class="stat-label">Approuvées</div>
                </div>
                <div class="stat-box">
                    <div class="stat-num" style="color:#c62828" id="refuseesCount">—</div>
                    <div class="stat-label">Refusées</div>
                </div>
            </div>

            <div class="filter-bar">
                <button class="tab active" data-f="all"        onclick="setFilter('all', this)">Toutes</button>
                <button class="tab"        data-f="en_attente" onclick="setFilter('en_attente', this)">⏳ En attente</button>
                <button class="tab"        data-f="approuve"   onclick="setFilter('approuve', this)">✅ Approuvées</button>
                <button class="tab"        data-f="refuse"     onclick="setFilter('refuse', this)">❌ Refusées</button>
            </div>

            <div class="reservations-list" id="reservationsList">
                <div class="empty-state">⏳ Chargement...</div>
            </div>
        </div>
    </div>

    <script src="api.js"></script>
    <script>
        const currentUser = authSystem.requireAuth('enseignant');
        function navigateTo(page) { window.location.href = page; }

        const statusLabel = { en_attente: '⏳ En attente', approuve: '✅ Approuvée', refuse: '❌ Refusée' };
        const statusBadge = { en_attente: 'badge-en-attente', approuve: 'badge-approuve', refuse: 'badge-refuse' };
        const cardClass   = { en_attente: '', approuve: 'approuve', refuse: 'refuse' };

        let allDemandes   = [];
        let currentFilter = 'all';

        function setFilter(f, btn) {
            currentFilter = f;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
            render();
        }

        async function loadReservations() {
            try {
                allDemandes = await dataManager.getDemandesByUser(currentUser.id);

                document.getElementById('totalCount').textContent      = allDemandes.length;
                document.getElementById('enAttenteCount').textContent  = allDemandes.filter(d => d.statut === 'en_attente').length;
                document.getElementById('approuveesCount').textContent = allDemandes.filter(d => d.statut === 'approuve').length;
                document.getElementById('refuseesCount').textContent   = allDemandes.filter(d => d.statut === 'refuse').length;

                render();
            } catch(err) {
                document.getElementById('reservationsList').innerHTML =
                    `<div class="empty-state" style="color:#c62828;">❌ Erreur: ${err.message}</div>`;
            }
        }

        function render() {
            const list = document.getElementById('reservationsList');
            const data = currentFilter === 'all'
                ? [...allDemandes].reverse()
                : allDemandes.filter(d => d.statut === currentFilter).reverse();

            if (data.length === 0) {
                list.innerHTML = '<div class="empty-state"><h3>📭 Aucune demande dans cette catégorie</h3></div>';
                return;
            }

            list.innerHTML = data.map(d => `
                <div class="reservation-card ${cardClass[d.statut] || ''}">
                    <div class="reservation-header">
                        <div>
                            <div class="reservation-salle">🏫 ${d.salle}</div>
                            <div class="date-soumis">Soumis le ${dataManager.formatDate(d.createdAt)}</div>
                        </div>
                        <span class="status-badge ${statusBadge[d.statut] || 'badge-en-attente'}">
                            ${statusLabel[d.statut] || d.statut}
                        </span>
                    </div>
                    <div class="reservation-details">
                        <div class="detail-item">
                            <span class="detail-label">Date</span>
                            <span class="detail-value">📅 ${d.date}</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Horaire</span>
                            <span class="detail-value">🕐 ${d.heureDebut} → ${d.heureFin}</span>
                        </div>
                        <div class="detail-item">
                            <span class="detail-label">Statut</span>
                            <span class="detail-value">${statusLabel[d.statut] || d.statut}</span>
                        </div>
                    </div>
                    <div class="reservation-motif"><strong>📝 Motif :</strong> ${d.motif}</div>

                    ${d.commentaireAdmin ? `
                        <div class="commentaire-admin ${d.statut === 'approuve' ? 'approved' : 'rejected'}">
                            <span>💬</span>
                            <div>
                                <strong>Réponse de l'administration :</strong> ${d.commentaireAdmin}
                                ${d.traitePar ? `<div class="traite-par">👤 Traité par ${d.traitePar} · ${dataManager.formatDate(d.dateTraitement)}</div>` : ''}
                            </div>
                        </div>` : ''}
                </div>`).join('');
        }

        loadReservations();
    </script>
</body>
</html>
