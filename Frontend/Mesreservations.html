<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mes Demandes - EduHestim</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; display: flex; min-height: 100vh; }
        .sidebar { width: 260px; background: linear-gradient(180deg, #003d82 0%, #002a5c 100%); color: white; position: fixed; height: 100vh; display: flex; flex-direction: column; }
        .logo-section { padding: 25px 20px; border-bottom: 2px solid rgba(255,255,255,0.1); display: flex; align-items: center; gap: 12px; }
        .logo-img { width: 45px; height: 45px; background: white; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.5em; }
        .logo-text { font-size: 1.4em; font-weight: 700; }
        .nav-menu { flex: 1; padding: 20px 0; }
        .nav-item { padding: 14px 20px; color: rgba(255,255,255,0.7); cursor: pointer; transition: all 0.3s; font-size: 0.95em; }
        .nav-item:hover { background: rgba(255,255,255,0.1); color: white; }
        .nav-item.active { background: #c1002a; color: white; }
        .logout-section { padding: 20px; border-top: 2px solid rgba(255,255,255,0.1); }
        .btn-logout { width: 100%; padding: 12px; background: #c1002a; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .main-content { margin-left: 260px; flex: 1; display: flex; flex-direction: column; }
        .top-bar { background: white; padding: 20px 35px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center; }
        .page-title { font-size: 1.8em; color: #003d82; font-weight: 700; }
        .btn-new { padding: 10px 20px; background: #003d82; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; text-decoration: none; font-size: 0.9em; }
        .content-area { padding: 30px 35px; overflow-y: auto; }
        .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 25px; }
        .stat-box { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); text-align: center; }
        .stat-num { font-size: 2em; font-weight: 700; color: #003d82; }
        .stat-label { color: #666; font-size: 0.85em; margin-top: 4px; }
        .filter-bar { background: white; padding: 15px 20px; border-radius: 10px; margin-bottom: 20px; display: flex; gap: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .tab { padding: 9px 18px; background: #f0f0f0; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; transition: all 0.2s; font-size: 0.9em; }
        .tab.active { background: #003d82; color: white; }
        .demandes-container { background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); overflow: hidden; }
        .demande-card { padding: 25px; border-bottom: 1px solid #f0f0f0; transition: background 0.2s; border-left: 4px solid #ffa500; }
        .demande-card.approuve { border-left-color: #2e7d32; }
        .demande-card.refuse   { border-left-color: #c62828; }
        .demande-card:last-child { border-bottom: none; }
        .demande-card:hover { background: #fafafa; }
        .demande-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .demande-title { font-size: 1.15em; color: #003d82; font-weight: 700; }
        .badge { display: inline-block; padding: 6px 14px; border-radius: 20px; font-size: 0.83em; font-weight: 700; }
        .badge.pending  { background: #fff3cd; color: #856404; }
        .badge.approved { background: #d4edda; color: #155724; }
        .badge.rejected { background: #f8d7da; color: #721c24; }
        .demande-details { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 10px; margin: 12px 0; }
        .detail-row { display: flex; align-items: center; gap: 8px; color: #555; font-size: 0.92em; }
        .detail-icon { font-size: 1em; }
        .commentaire-admin { margin-top: 12px; padding: 12px 15px; border-radius: 8px; font-size: 0.9em; display: flex; align-items: flex-start; gap: 8px; }
        .commentaire-admin.approved { background: #e8f5e9; color: #2e7d32; border-left: 3px solid #2e7d32; }
        .commentaire-admin.rejected { background: #ffebee; color: #c62828; border-left: 3px solid #c62828; }
        .traite-par { margin-top: 6px; color: #999; font-size: 0.82em; }
        .date-soumis { color: #aaa; font-size: 0.82em; margin-top: 4px; }
        .empty-state { text-align: center; padding: 60px 20px; color: #aaa; }
        @media (max-width: 768px) { .stats-row { grid-template-columns: repeat(2,1fr); } }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo-section">
            <div class="logo-img">📚</div>
            <div class="logo-text">EduHestim</div>
        </div>
        <div class="nav-menu">
            <div class="nav-item" onclick="navigateTo('Etudiantdash.html')">📊 Dashboard</div>
            <div class="nav-item" onclick="navigateTo('Emploiedutemps.html')">📅 Emploi du Temps</div>
            <div class="nav-item" onclick="navigateTo('Fairedesdemandes.html')">📋 Faire une Demande</div>
            <div class="nav-item active">📝 Mes Demandes</div>
            <div class="nav-item" onclick="navigateTo('NotifEtudiant.html')">🔔 Notifications</div>
            <div class="nav-item" onclick="navigateTo('Profiletudiant.html')">👤 Mon Profil</div>
        </div>
        <div class="logout-section">
            <button class="btn-logout" onclick="authSystem.logout()">🚪 Déconnexion</button>
        </div>
    </div>

    <div class="main-content">
        <div class="top-bar">
            <h1 class="page-title">📝 Mes Demandes</h1>
            <a href="Fairedesdemandes.html" class="btn-new">➕ Nouvelle Demande</a>
        </div>
        <div class="content-area">

            <!-- Stats -->
            <div class="stats-row">
                <div class="stat-box">
                    <div class="stat-num" id="statTotal">—</div>
                    <div class="stat-label">Total</div>
                </div>
                <div class="stat-box">
                    <div class="stat-num" style="color:#856404" id="statAttente">—</div>
                    <div class="stat-label">En attente</div>
                </div>
                <div class="stat-box">
                    <div class="stat-num" style="color:#2e7d32" id="statApprouve">—</div>
                    <div class="stat-label">Approuvées</div>
                </div>
                <div class="stat-box">
                    <div class="stat-num" style="color:#c62828" id="statRefuse">—</div>
                    <div class="stat-label">Refusées</div>
                </div>
            </div>

            <!-- Filtres -->
            <div class="filter-bar">
                <button class="tab active" data-f="all"        onclick="setFilter('all', this)">Toutes</button>
                <button class="tab"        data-f="en_attente" onclick="setFilter('en_attente', this)">⏳ En attente</button>
                <button class="tab"        data-f="approuve"   onclick="setFilter('approuve', this)">✅ Approuvées</button>
                <button class="tab"        data-f="refuse"     onclick="setFilter('refuse', this)">❌ Refusées</button>
            </div>

            <div id="demandesContainer" class="demandes-container">
                <div class="empty-state">⏳ Chargement...</div>
            </div>
        </div>
    </div>

    <script src="api.js"></script>
    <script>
        const currentUser = authSystem.requireAuth('etudiant');
        function navigateTo(page) { window.location.href = page; }

        const statusClass = { en_attente: 'pending',  approuve: 'approved', refuse: 'rejected' };
        const statusLabel = { en_attente: '⏳ En attente', approuve: '✅ Approuvée', refuse: '❌ Refusée' };
        const cardClass   = { en_attente: '',          approuve: 'approuve', refuse: 'refuse' };

        let allDemandes = [];
        let currentFilter = 'all';

        function setFilter(f, btn) {
            currentFilter = f;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
            render();
        }

        async function loadDemandes() {
            const container = document.getElementById('demandesContainer');
            try {
                allDemandes = await dataManager.getDemandesByUser(currentUser.id);

                // Stats
                document.getElementById('statTotal').textContent   = allDemandes.length;
                document.getElementById('statAttente').textContent  = allDemandes.filter(d => d.statut === 'en_attente').length;
                document.getElementById('statApprouve').textContent = allDemandes.filter(d => d.statut === 'approuve').length;
                document.getElementById('statRefuse').textContent   = allDemandes.filter(d => d.statut === 'refuse').length;

                render();
            } catch(err) {
                container.innerHTML = `<div class="empty-state" style="color:#c62828;">❌ Erreur: ${err.message}</div>`;
            }
        }

        function render() {
            const container = document.getElementById('demandesContainer');
            const list = currentFilter === 'all'
                ? [...allDemandes].reverse()
                : allDemandes.filter(d => d.statut === currentFilter).reverse();

            if (list.length === 0) {
                container.innerHTML = '<div class="empty-state"><h3>📭 Aucune demande</h3><p style="margin-top:8px;">Vous n\'avez pas encore de demande dans cette catégorie.</p></div>';
                return;
            }

            container.innerHTML = list.map(d => `
                <div class="demande-card ${cardClass[d.statut] || ''}">
                    <div class="demande-header">
                        <div>
                            <div class="demande-title">🏫 ${d.salle}</div>
                            <div class="date-soumis">Soumis le ${dataManager.formatDate(d.createdAt)}</div>
                        </div>
                        <span class="badge ${statusClass[d.statut] || 'pending'}">
                            ${statusLabel[d.statut] || d.statut}
                        </span>
                    </div>
                    <div class="demande-details">
                        <div class="detail-row"><span class="detail-icon">📅</span><span>${d.date}</span></div>
                        <div class="detail-row"><span class="detail-icon">🕐</span><span>${d.heureDebut} → ${d.heureFin}</span></div>
                    </div>
                    <div class="detail-row"><span class="detail-icon">📝</span><span><strong>Motif :</strong> ${d.motif}</span></div>

                    ${d.commentaireAdmin ? `
                        <div class="commentaire-admin ${d.statut === 'approuve' ? 'approved' : 'rejected'}">
                            <span>💬</span>
                            <div>
                                <strong>Réponse de l'administration :</strong> ${d.commentaireAdmin}
                                ${d.traitePar ? `<div class="traite-par">👤 Traité par ${d.traitePar} · ${dataManager.formatDate(d.dateTraitement)}</div>` : ''}
                            </div>
                        </div>` : ''}
                </div>`).join('');
        }

        loadDemandes();
    </script>
</body>
</html>
