<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Créer un Utilisateur - EduHestim</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; display: flex; min-height: 100vh; }
        .sidebar { width: 260px; background: linear-gradient(180deg, #003d82 0%, #002a5c 100%); color: white; position: fixed; height: 100vh; display: flex; flex-direction: column; }
        .logo-section { padding: 25px 20px; border-bottom: 2px solid rgba(255,255,255,0.1); display: flex; align-items: center; gap: 12px; }
        .logo-img { width: 45px; height: 45px; background: white; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.5em; }
        .logo-text { font-size: 1.4em; font-weight: 700; }
        .nav-menu { flex: 1; padding: 20px 0; }
        .nav-item { padding: 14px 20px; color: rgba(255,255,255,0.7); cursor: pointer; transition: all 0.3s; font-size: 0.95em; }
        .nav-item:hover { background: rgba(255,255,255,0.1); color: white; }
        .nav-item.active { background: #c1002a; color: white; }
        .logout-section { padding: 20px; border-top: 2px solid rgba(255,255,255,0.1); }
        .btn-logout { width: 100%; padding: 12px; background: #c1002a; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .main-content { margin-left: 260px; flex: 1; display: flex; flex-direction: column; }
        .top-bar { background: white; padding: 20px 35px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .page-title { font-size: 1.8em; color: #003d82; font-weight: 700; }
        .content-area { padding: 30px 35px; overflow-y: auto; }
        .form-container { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); max-width: 800px; margin: 0 auto; }
        .form-header { margin-bottom: 30px; padding-bottom: 20px; border-bottom: 2px solid #f0f0f0; }
        .form-header h2 { color: #003d82; font-size: 1.6em; margin-bottom: 8px; }
        .form-header p { color: #666; font-size: 0.95em; }
        .form-group { margin-bottom: 25px; }
        .form-group label { display: block; margin-bottom: 8px; color: #003d82; font-weight: 600; font-size: 0.95em; }
        .form-group input, .form-group select { width: 100%; padding: 12px 15px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 0.95em; transition: all 0.3s; }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: #003d82; box-shadow: 0 0 0 3px rgba(0,61,130,0.1); }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .btn-submit { width: 100%; padding: 15px; background: #003d82; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 1.1em; transition: all 0.3s; }
        .btn-submit:hover { background: #002a5c; }
        .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }
        .success-message { background: #e8f5e9; color: #2e7d32; padding: 15px; border-radius: 8px; margin-bottom: 20px; border-left: 4px solid #2e7d32; display: none; }
        .success-message.show { display: block; }
        .error-message { background: #ffebee; color: #c62828; padding: 15px; border-radius: 8px; margin-bottom: 20px; border-left: 4px solid #c62828; display: none; }
        .error-message.show { display: block; }
        .conditional-field { display: none; }
        .conditional-field.show { display: block; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo-section">
            <div class="logo-img">📚</div>
            <div class="logo-text">EduHestim</div>
        </div>
        <div class="nav-menu">
            <div class="nav-item" onclick="navigateTo('admindash.html')">📊 Dashboard</div>
            <div class="nav-item active">👥 Créer Utilisateur</div>
            <div class="nav-item" onclick="navigateTo('GestiondesalleAdmin.html')">🏫 Salles</div>
            <div class="nav-item" onclick="navigateTo('GestionClasses.html')">📚 Classes</div>
            <div class="nav-item" onclick="navigateTo('GestionDemandes-Admin.html')">📋 Demandes</div>
        </div>
        <div class="logout-section">
            <button class="btn-logout" onclick="authSystem.logout()">🚪 Déconnexion</button>
        </div>
    </div>

    <div class="main-content">
        <div class="top-bar">
            <h1 class="page-title">Créer un Utilisateur</h1>
        </div>
        <div class="content-area">
            <div id="successMessage" class="success-message"></div>
            <div id="errorMessage" class="error-message"></div>

            <div class="form-container">
                <div class="form-header">
                    <h2>Nouveau Compte</h2>
                    <p>Créer un nouveau compte utilisateur</p>
                </div>

                <div class="form-group">
                    <label>Type d'utilisateur *</label>
                    <select id="role" required onchange="toggleFields()">
                        <option value="">Sélectionnez un rôle</option>
                        <option value="enseignant">Enseignant</option>
                        <option value="etudiant">Étudiant</option>
                    </select>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Nom *</label>
                        <input type="text" id="nom" required>
                    </div>
                    <div class="form-group">
                        <label>Prénom *</label>
                        <input type="text" id="prenom" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Email *</label>
                    <input type="email" id="email" required placeholder="utilisateur@hestim.ma">
                </div>
                <div class="form-group">
                    <label>Mot de passe *</label>
                    <input type="password" id="password" required minlength="6" placeholder="Minimum 6 caractères">
                </div>
                <div class="form-group conditional-field" id="departementField">
                    <label>Département</label>
                    <input type="text" id="departement" placeholder="Ex: Informatique, Mathématiques">
                </div>
                <div class="form-group conditional-field" id="matiereField">
                    <label>Matière enseignée</label>
                    <input type="text" id="matiere" placeholder="Ex: POO, Base de données">
                </div>
                <div class="form-group conditional-field" id="classeField">
                    <label>Classe</label>
                    <select id="classe">
                        <option value="">Chargement...</option>
                    </select>
                </div>

                <button class="btn-submit" id="btnSubmit" onclick="createUser()">Créer le Compte</button>
            </div>
        </div>
    </div>

    <script src="api.js"></script>
    <script>
        requireAuth('administrateur');

        function navigateTo(page) { window.location.href = page; }

        function toggleFields() {
            const role = document.getElementById('role').value;
            document.getElementById('departementField').classList.toggle('show', role === 'enseignant');
            document.getElementById('matiereField').classList.toggle('show', role === 'enseignant');
            document.getElementById('classeField').classList.toggle('show', role === 'etudiant');
        }

        async function loadClasses() {
            try {
                const classes = await dataManager.getClasses();
                const select  = document.getElementById('classe');
                select.innerHTML = '<option value="">Sélectionnez une classe</option>';
                classes.forEach(c => {
                    select.innerHTML += `<option value="${c.code}">${c.nom}</option>`;
                });
            } catch (err) { console.error(err); }
        }

        async function createUser() {
            const role     = document.getElementById('role').value;
            const nom      = document.getElementById('nom').value.trim();
            const prenom   = document.getElementById('prenom').value.trim();
            const email    = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if (!role || !nom || !prenom || !email || !password) {
                alert('Veuillez remplir tous les champs obligatoires'); return;
            }

            const userData = { role, nom, prenom, email, password };
            if (role === 'enseignant') {
                userData.departement = document.getElementById('departement').value;
                userData.matiere     = document.getElementById('matiere').value;
            } else if (role === 'etudiant') {
                userData.classe = document.getElementById('classe').value;
            }

            const btn = document.getElementById('btnSubmit');
            btn.disabled = true;
            btn.textContent = '⏳ Création...';

            try {
                await dataManager.addUser(userData);
                const msg = document.getElementById('successMessage');
                msg.textContent = `✓ Compte créé avec succès pour ${prenom} ${nom} !`;
                msg.classList.add('show');
                document.getElementById('nom').value = '';
                document.getElementById('prenom').value = '';
                document.getElementById('email').value = '';
                document.getElementById('password').value = '';
                document.getElementById('role').value = '';
                toggleFields();
                setTimeout(() => msg.classList.remove('show'), 5000);
            } catch (err) {
                const msg = document.getElementById('errorMessage');
                msg.textContent = '❌ Erreur : ' + (err.message.includes('déjà') ? 'Cet email est déjà utilisé' : err.message);
                msg.classList.add('show');
                setTimeout(() => msg.classList.remove('show'), 5000);
            } finally {
                btn.disabled = false;
                btn.textContent = 'Créer le Compte';
            }
        }

        loadClasses();
    </script>
</body>
</html>
