<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion des Demandes - EduHestim</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; display: flex; min-height: 100vh; }
        .sidebar { width: 260px; background: linear-gradient(180deg, #003d82 0%, #002a5c 100%); color: white; position: fixed; height: 100vh; display: flex; flex-direction: column; }
        .logo-section { padding: 25px 20px; border-bottom: 2px solid rgba(255,255,255,0.1); display: flex; align-items: center; gap: 12px; }
        .logo-img { width: 45px; height: 45px; background: white; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.5em; }
        .logo-text { font-size: 1.4em; font-weight: 700; }
        .nav-menu { flex: 1; padding: 20px 0; overflow-y: auto; }
        .nav-item { padding: 14px 20px; color: rgba(255,255,255,0.7); cursor: pointer; transition: all 0.3s; font-size: 0.95em; }
        .nav-item:hover { background: rgba(255,255,255,0.1); color: white; }
        .nav-item.active { background: #c1002a; color: white; }
        .logout-section { padding: 20px; border-top: 2px solid rgba(255,255,255,0.1); }
        .btn-logout { width: 100%; padding: 12px; background: #c1002a; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .main-content { margin-left: 260px; flex: 1; display: flex; flex-direction: column; }
        .top-bar { background: white; padding: 20px 35px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center; }
        .page-title { font-size: 1.8em; color: #003d82; font-weight: 700; }
        .content-area { padding: 30px 35px; overflow-y: auto; }
        .stats-bar { display: flex; gap: 15px; margin-bottom: 25px; }
        .stat-card { background: white; padding: 15px 25px; border-radius: 10px; text-align: center; flex: 1; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .stat-num { font-size: 2em; font-weight: 700; color: #003d82; }
        .stat-label { font-size: 0.85em; color: #666; margin-top: 4px; }
        .filter-tabs { display: flex; gap: 10px; margin-bottom: 25px; background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .tab { padding: 10px 20px; background: #f0f0f0; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; transition: all 0.3s; }
        .tab.active { background: #003d82; color: white; }
        .demandes-container { background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); overflow: hidden; }
        .demande-card { padding: 25px; border-bottom: 1px solid #f0f0f0; transition: background 0.2s; }
        .demande-card:last-child { border-bottom: none; }
        .demande-card:hover { background: #fafafa; }
        .demande-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; }
        .demande-title { font-size: 1.1em; color: #003d82; font-weight: 700; margin-bottom: 4px; }
        .demande-meta { color: #888; font-size: 0.88em; }
        .badge { display: inline-block; padding: 6px 14px; border-radius: 20px; font-size: 0.83em; font-weight: 700; }
        .badge.pending  { background: #fff3cd; color: #856404; }
        .badge.approved { background: #d4edda; color: #155724; }
        .badge.rejected { background: #f8d7da; color: #721c24; }
        .demande-details { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; margin: 15px 0; }
        .detail-item { display: flex; align-items: center; gap: 8px; font-size: 0.92em; color: #444; }
        .detail-icon { font-size: 1.1em; }
        .demande-actions { display: flex; gap: 10px; margin-top: 15px; }
        .btn { padding: 10px 22px; border: none; border-radius: 7px; cursor: pointer; font-weight: 600; font-size: 0.95em; transition: all 0.2s; }
        .btn-approve { background: #2e7d32; color: white; }
        .btn-approve:hover { background: #1b5e20; }
        .btn-reject  { background: #c62828; color: white; }
        .btn-reject:hover  { background: #b71c1c; }
        .btn-approve:disabled, .btn-reject:disabled { opacity: 0.6; cursor: not-allowed; }
        .empty-state { text-align: center; padding: 60px 20px; color: #aaa; font-size: 1.05em; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 1000; }
        .modal.show { display: flex; }
        .modal-content { background: white; padding: 30px; border-radius: 14px; max-width: 480px; width: 90%; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        .modal-title { font-size: 1.3em; color: #003d82; margin-bottom: 8px; font-weight: 700; }
        .modal-sub { color: #666; font-size: 0.9em; margin-bottom: 20px; }
        textarea { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; resize: vertical; min-height: 100px; font-family: inherit; font-size: 0.95em; }
        textarea:focus { outline: none; border-color: #003d82; }
        .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
        .btn-cancel { background: #e0e0e0; color: #333; }
        .btn-cancel:hover { background: #ccc; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo-section">
            <div class="logo-img">📚</div>
            <div class="logo-text">EduHestim</div>
        </div>
        <div class="nav-menu">
            <div class="nav-item" onclick="navigateTo('admindash.html')">📊 Dashboard</div>
            <div class="nav-item" onclick="navigateTo('PagelistedesUtilisateurs.html')">👥 Utilisateurs</div>
            <div class="nav-item" onclick="navigateTo('GestiondesalleAdmin.html')">🏫 Salles</div>
            <div class="nav-item" onclick="navigateTo('GestionClasses.html')">📚 Classes</div>
            <div class="nav-item" onclick="navigateTo('GererEmploiDuTemps.html')">📅 Emplois du Temps</div>
            <div class="nav-item active">📋 Demandes</div>
            <div class="nav-item" onclick="navigateTo('NotifAdmin.html')">🔔 Notifications</div>
            <div class="nav-item" onclick="navigateTo('ProfilAdmin.html')">👤 Mon Profil</div>
        </div>
        <div class="logout-section">
            <button class="btn-logout" onclick="authSystem.logout()">🚪 Déconnexion</button>
        </div>
    </div>

    <div class="main-content">
        <div class="top-bar">
            <h1 class="page-title">📋 Gestion des Demandes</h1>
        </div>
        <div class="content-area">

            <!-- Stats -->
            <div class="stats-bar">
                <div class="stat-card">
                    <div class="stat-num" id="statTotal">—</div>
                    <div class="stat-label">Total</div>
                </div>
                <div class="stat-card">
                    <div class="stat-num" style="color:#856404" id="statAttente">—</div>
                    <div class="stat-label">En attente</div>
                </div>
                <div class="stat-card">
                    <div class="stat-num" style="color:#2e7d32" id="statApprouve">—</div>
                    <div class="stat-label">Approuvées</div>
                </div>
                <div class="stat-card">
                    <div class="stat-num" style="color:#c62828" id="statRefuse">—</div>
                    <div class="stat-label">Refusées</div>
                </div>
            </div>

            <div class="filter-tabs">
                <button class="tab active" data-filter="all"        onclick="filterDemandes('all')">Toutes</button>
                <button class="tab"        data-filter="en_attente" onclick="filterDemandes('en_attente')">⏳ En attente</button>
                <button class="tab"        data-filter="approuve"   onclick="filterDemandes('approuve')">✅ Approuvées</button>
                <button class="tab"        data-filter="refuse"     onclick="filterDemandes('refuse')">❌ Refusées</button>
            </div>

            <div id="demandesContainer" class="demandes-container">
                <div class="empty-state">⏳ Chargement...</div>
            </div>
        </div>
    </div>

    <!-- Modal commentaire -->
    <div id="commentModal" class="modal">
        <div class="modal-content">
            <h3 class="modal-title" id="modalTitle">Confirmer l'action</h3>
            <p class="modal-sub" id="modalSub"></p>
            <textarea id="commentText" placeholder="Commentaire (optionnel pour approbation, recommandé pour refus)..."></textarea>
            <div class="modal-actions">
                <button class="btn btn-cancel" onclick="closeModal()">Annuler</button>
                <button class="btn" id="confirmBtn" onclick="confirmAction()">Confirmer</button>
            </div>
        </div>
    </div>

    <script src="api.js"></script>
    <script>
        // ✅ FIX: appel correct de requireAuth
        const currentUser = authSystem.requireAuth('administrateur');

        let allDemandes   = [];
        let currentFilter = 'all';
        let currentAction = null;
        let currentDemandeId = null;

        function navigateTo(page) { window.location.href = page; }

        function filterDemandes(filter) {
            currentFilter = filter;
            document.querySelectorAll('.tab').forEach(t =>
                t.classList.toggle('active', t.dataset.filter === filter)
            );
            renderDemandes();
        }

        async function loadDemandes() {
            const container = document.getElementById('demandesContainer');
            container.innerHTML = '<div class="empty-state">⏳ Chargement...</div>';
            try {
                allDemandes = await dataManager.getDemandes();

                // Stats
                document.getElementById('statTotal').textContent   = allDemandes.length;
                document.getElementById('statAttente').textContent  = allDemandes.filter(d => d.statut === 'en_attente').length;
                document.getElementById('statApprouve').textContent = allDemandes.filter(d => d.statut === 'approuve').length;
                document.getElementById('statRefuse').textContent   = allDemandes.filter(d => d.statut === 'refuse').length;

                renderDemandes();
            } catch(err) {
                container.innerHTML = `<div class="empty-state" style="color:#c62828;">❌ Erreur: ${err.message}</div>`;
            }
        }

        function renderDemandes() {
            const container = document.getElementById('demandesContainer');
            let demandes = currentFilter === 'all'
                ? allDemandes
                : allDemandes.filter(d => d.statut === currentFilter);

            if (demandes.length === 0) {
                container.innerHTML = '<div class="empty-state">📭 Aucune demande dans cette catégorie</div>';
                return;
            }

            const statusLabel = { en_attente: '⏳ En attente', approuve: '✅ Approuvée', refuse: '❌ Refusée' };
            const statusClass = { en_attente: 'pending',       approuve: 'approved',      refuse: 'rejected' };

            container.innerHTML = demandes.map(d => `
                <div class="demande-card">
                    <div class="demande-header">
                        <div>
                            <div class="demande-title">${d.userName || 'Inconnu'}</div>
                            <div class="demande-meta">
                                ${d.userRole === 'etudiant' ? '🎓 Étudiant' : d.userRole === 'enseignant' ? '👨‍🏫 Enseignant' : d.userRole || ''}
                                &nbsp;•&nbsp; Soumis le ${dataManager.formatDate(d.createdAt)}
                            </div>
                        </div>
                        <span class="badge ${statusClass[d.statut] || 'pending'}">
                            ${statusLabel[d.statut] || d.statut}
                        </span>
                    </div>
                    <div class="demande-details">
                        <div class="detail-item"><span class="detail-icon">🏫</span><span><strong>${d.salle}</strong></span></div>
                        <div class="detail-item"><span class="detail-icon">📅</span><span>${d.date}</span></div>
                        <div class="detail-item"><span class="detail-icon">🕐</span><span>${d.heureDebut} → ${d.heureFin}</span></div>
                    </div>
                    <div class="detail-item"><span class="detail-icon">📝</span><span><strong>Motif :</strong> ${d.motif}</span></div>
                    ${d.commentaireAdmin ? `<div class="detail-item" style="margin-top:8px;color:#555;"><span class="detail-icon">💬</span><span><strong>Commentaire admin :</strong> ${d.commentaireAdmin}</span></div>` : ''}
                    ${d.traitePar ? `<div class="detail-item" style="margin-top:4px;color:#888;font-size:0.85em;"><span class="detail-icon">👤</span><span>Traité par ${d.traitePar} le ${dataManager.formatDate(d.dateTraitement)}</span></div>` : ''}
                    ${d.statut === 'en_attente' ? `
                        <div class="demande-actions">
                            <button class="btn btn-approve" onclick="openApproveModal('${d._id}', '${(d.userName||'').replace(/'/g,"\\'")}')">✅ Approuver</button>
                            <button class="btn btn-reject"  onclick="openRejectModal('${d._id}',  '${(d.userName||'').replace(/'/g,"\\'")}')">❌ Refuser</button>
                        </div>` : ''}
                </div>`).join('');
        }

        function openApproveModal(id, name) {
            currentDemandeId = id;
            currentAction    = 'approve';
            document.getElementById('modalTitle').textContent      = '✅ Approuver la demande';
            document.getElementById('modalSub').textContent        = `Demande de : ${name}`;
            document.getElementById('commentText').value           = '';
            document.getElementById('confirmBtn').style.background = '#2e7d32';
            document.getElementById('confirmBtn').textContent      = 'Approuver';
            document.getElementById('commentModal').classList.add('show');
        }

        function openRejectModal(id, name) {
            currentDemandeId = id;
            currentAction    = 'reject';
            document.getElementById('modalTitle').textContent      = '❌ Refuser la demande';
            document.getElementById('modalSub').textContent        = `Demande de : ${name}`;
            document.getElementById('commentText').value           = '';
            document.getElementById('confirmBtn').style.background = '#c62828';
            document.getElementById('confirmBtn').textContent      = 'Refuser';
            document.getElementById('commentModal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('commentModal').classList.remove('show');
            document.getElementById('commentText').value = '';
            currentDemandeId = null;
            currentAction    = null;
        }

        async function confirmAction() {
            const comment    = document.getElementById('commentText').value.trim();
            const confirmBtn = document.getElementById('confirmBtn');
            const adminName  = `${currentUser.prenom} ${currentUser.nom}`;

            confirmBtn.disabled    = true;
            confirmBtn.textContent = '⏳...';

            try {
                if (currentAction === 'approve') {
                    // ✅ FIX: approuverDemande() au lieu de updateDemandeStatut()
                    await dataManager.approuverDemande(currentDemandeId, {
                        adminName,
                        commentaire: comment || 'Demande approuvée'
                    });
                } else {
                    // ✅ FIX: refuserDemande() au lieu de updateDemandeStatut()
                    await dataManager.refuserDemande(currentDemandeId, {
                        adminName,
                        commentaire: comment || 'Demande refusée'
                    });
                }
                closeModal();
                await loadDemandes();
            } catch(err) {
                alert('❌ Erreur : ' + err.message);
                confirmBtn.disabled    = false;
                confirmBtn.textContent = currentAction === 'approve' ? 'Approuver' : 'Refuser';
            }
        }

        // Fermer modal en cliquant en dehors
        document.getElementById('commentModal').addEventListener('click', e => {
            if (e.target === document.getElementById('commentModal')) closeModal();
        });

        loadDemandes();
    </script>
</body>
</html>
