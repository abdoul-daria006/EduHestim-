<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emploi du Temps - EduHestim</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; display: flex; min-height: 100vh; }
        .sidebar { width: 260px; background: linear-gradient(180deg, #003d82 0%, #002a5c 100%); color: white; position: fixed; height: 100vh; display: flex; flex-direction: column; }
        .logo-section { padding: 25px 20px; border-bottom: 2px solid rgba(255,255,255,0.1); display: flex; align-items: center; gap: 12px; }
        .logo-img { width: 45px; height: 45px; background: white; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 1.5em; }
        .logo-text { font-size: 1.4em; font-weight: 700; }
        .nav-menu { flex: 1; padding: 20px 0; }
        .nav-item { padding: 14px 20px; color: rgba(255,255,255,0.7); cursor: pointer; transition: all 0.3s; font-size: 0.95em; }
        .nav-item:hover { background: rgba(255,255,255,0.1); color: white; }
        .nav-item.active { background: #c1002a; color: white; }
        .logout-section { padding: 20px; border-top: 2px solid rgba(255,255,255,0.1); }
        .btn-logout { width: 100%; padding: 12px; background: #c1002a; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }
        .main-content { margin-left: 260px; flex: 1; display: flex; flex-direction: column; }
        .top-bar { background: white; padding: 20px 35px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .page-title { font-size: 1.8em; color: #003d82; font-weight: 700; }
        .top-controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .classe-info { padding: 8px 18px; background: #e3f2fd; color: #003d82; border-radius: 20px; font-weight: 700; font-size: 0.9em; }
        .content-area { padding: 25px 35px; overflow-y: auto; }
        .calendar-wrapper { background: white; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); overflow-x: auto; }
        .calendar-grid { display: grid; grid-template-columns: 110px repeat(5, 1fr); min-width: 850px; }
        .cal-header { background: #003d82; color: white; padding: 14px 10px; font-weight: 700; text-align: center; font-size: 0.9em; }
        .cal-header.day { background: #002a5c; }
        .time-label { background: #f8f9fa; padding: 0 10px; text-align: center; font-weight: 700; color: #003d82; border-right: 2px solid #e0e0e0; border-bottom: 1px solid #e0e0e0; font-size: 0.82em; display: flex; align-items: center; justify-content: center; min-height: 90px; line-height: 1.4; }
        .cal-cell { border: 1px solid #eee; min-height: 90px; padding: 6px; background: white; transition: background 0.2s; }
        .cal-cell:hover { background: #fafafa; }
        .course-block { padding: 10px 12px; border-radius: 8px; color: white; font-size: 0.82em; cursor: pointer; transition: all 0.2s; height: 100%; box-sizing: border-box; }
        .course-block:hover { transform: scale(1.02); box-shadow: 0 3px 10px rgba(0,0,0,0.2); }
        .course-block.CM { background: linear-gradient(135deg, #003d82, #005cb2); }
        .course-block.TD { background: linear-gradient(135deg, #c1002a, #e53935); }
        .course-block.TP { background: linear-gradient(135deg, #2e7d32, #43a047); }
        .c-name { font-weight: 700; margin-bottom: 5px; line-height: 1.3; }
        .c-info { opacity: 0.88; font-size: 0.9em; line-height: 1.4; }
        .legend { background: white; padding: 18px 22px; margin-top: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); display: flex; align-items: center; gap: 25px; flex-wrap: wrap; }
        .legend span { font-weight: 700; color: #003d82; margin-right: 5px; }
        .leg-item { display: flex; align-items: center; gap: 8px; font-size: 0.9em; color: #555; }
        .leg-dot { width: 16px; height: 16px; border-radius: 4px; }
        /* Modal */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
        .modal-overlay.show { display: flex; }
        .modal { background: white; border-radius: 14px; padding: 30px; width: 420px; max-width: 95vw; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .modal h3 { color: #003d82; font-size: 1.2em; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 2px solid #f0f0f0; }
        .modal-row { display: flex; gap: 10px; margin-bottom: 12px; }
        .modal-label { color: #888; font-size: 0.85em; width: 110px; flex-shrink: 0; padding-top: 2px; }
        .modal-value { color: #222; font-weight: 600; font-size: 0.95em; }
        .modal-close { margin-top: 20px; width: 100%; padding: 12px; background: #003d82; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; }
        .empty-cell { color: #ddd; text-align: center; font-size: 1.5em; padding-top: 25px; }
        @media (max-width: 768px) { .content-area { padding: 15px; } }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo-section">
            <div class="logo-img">📚</div>
            <div class="logo-text">EduHestim</div>
        </div>
        <div class="nav-menu">
            <div class="nav-item" onclick="navigateTo('Etudiantdash.html')">📊 Dashboard</div>
            <div class="nav-item active">📅 Emploi du Temps</div>
            <div class="nav-item" onclick="navigateTo('Fairedesdemandes.html')">📋 Faire une Demande</div>
            <div class="nav-item" onclick="navigateTo('Mesreservations.html')">📝 Mes Demandes</div>
            <div class="nav-item" onclick="navigateTo('NotifEtudiant.html')">🔔 Notifications</div>
            <div class="nav-item" onclick="navigateTo('Profiletudiant.html')">👤 Mon Profil</div>
        </div>
        <div class="logout-section">
            <button class="btn-logout" onclick="authSystem.logout()">🚪 Déconnexion</button>
        </div>
    </div>

    <div class="main-content">
        <div class="top-bar">
            <h1 class="page-title">📅 Emploi du Temps</h1>
            <div class="top-controls">
                <div class="classe-info" id="classeInfo">🎓 Chargement...</div>
            </div>
        </div>
        <div class="content-area">
            <div class="calendar-wrapper">
                <div id="calendarGrid" class="calendar-grid">
                    <div style="grid-column:1/-1;padding:50px;text-align:center;color:#aaa;">⏳ Chargement de l'emploi du temps...</div>
                </div>
            </div>
            <div class="legend">
                <span>Légende :</span>
                <div class="leg-item"><div class="leg-dot" style="background:#003d82;"></div> Cours Magistral (CM)</div>
                <div class="leg-item"><div class="leg-dot" style="background:#c1002a;"></div> Travaux Dirigés (TD)</div>
                <div class="leg-item"><div class="leg-dot" style="background:#2e7d32;"></div> Travaux Pratiques (TP)</div>
            </div>
        </div>
    </div>

    <!-- Modal détail cours -->
    <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
        <div class="modal">
            <h3>📚 Détail du cours</h3>
            <div id="modalContent"></div>
            <button class="modal-close" onclick="document.getElementById('modalOverlay').classList.remove('show')">Fermer</button>
        </div>
    </div>

    <script src="api.js"></script>
    <script>
        // ✅ FIX: authSystem.requireAuth
        const currentUser = authSystem.requireAuth('etudiant');
        function navigateTo(page) { window.location.href = page; }

        const JOURS    = ['Lundi', 'Mardi', 'Mercredi', 'Jeudi', 'Vendredi'];
        const CRENEAUX = [
            { debut: '08:00', label: '08h00\n10h00' },
            { debut: '10:15', label: '10h15\n12h15' },
            { debut: '14:00', label: '14h00\n16h00' },
            { debut: '16:15', label: '16h15\n18h15' },
        ];

        function showDetail(c) {
            document.getElementById('modalContent').innerHTML = `
                <div class="modal-row"><span class="modal-label">Matière</span><span class="modal-value">📖 ${c.matiere}</span></div>
                <div class="modal-row"><span class="modal-label">Type</span><span class="modal-value">${c.type}</span></div>
                <div class="modal-row"><span class="modal-label">Enseignant</span><span class="modal-value">👨‍🏫 ${c.enseignantNom || '—'}</span></div>
                <div class="modal-row"><span class="modal-label">Salle</span><span class="modal-value">🏫 ${c.salle}</span></div>
                <div class="modal-row"><span class="modal-label">Jour</span><span class="modal-value">📅 ${c.jour}</span></div>
                <div class="modal-row"><span class="modal-label">Horaire</span><span class="modal-value">🕐 ${c.heureDebut} – ${c.heureFin}</span></div>
            `;
            document.getElementById('modalOverlay').classList.add('show');
        }

        function closeModal(e) {
            if (e.target === document.getElementById('modalOverlay'))
                document.getElementById('modalOverlay').classList.remove('show');
        }

        async function loadEmploiDuTemps() {
            const grid = document.getElementById('calendarGrid');
            try {
                // ✅ FIX: getUserById correct
                const userDetails = await dataManager.getUserById(currentUser.id);
                const classeCode  = userDetails.classe || userDetails.classeCode || '';

                if (!classeCode) {
                    grid.innerHTML = `<div style="grid-column:1/-1;padding:50px;text-align:center;color:#c62828;">⚠️ Aucune classe assignée à votre profil.<br>Contactez l'administration.</div>`;
                    document.getElementById('classeInfo').textContent = '⚠️ Classe non définie';
                    return;
                }

                document.getElementById('classeInfo').textContent = `🎓 Classe : ${classeCode}`;

                // ✅ FIX: getEmploisByClasse correct
                const cours = await dataManager.getEmploisByClasse(classeCode);

                let html = `<div class="cal-header">Horaires</div>`;
                JOURS.forEach(j => { html += `<div class="cal-header day">${j}</div>`; });

                CRENEAUX.forEach(({ debut, label }) => {
                    html += `<div class="time-label">${label.replace('\n', '<br>')}</div>`;
                    JOURS.forEach(jour => {
                        const c = cours.find(x => x.jour === jour && x.heureDebut === debut);
                        if (c) {
                            html += `<div class="cal-cell">
                                <div class="course-block ${c.type || 'CM'}" onclick='showDetail(${JSON.stringify(c)})'>
                                    <div class="c-name">${c.matiere}</div>
                                    <div class="c-info">${c.enseignantNom || ''}<br>🏫 ${c.salle}</div>
                                </div>
                            </div>`;
                        } else {
                            html += `<div class="cal-cell"><div class="empty-cell">·</div></div>`;
                        }
                    });
                });

                grid.innerHTML = html;

                if (cours.length === 0) {
                    grid.innerHTML = `<div style="grid-column:1/-1;padding:50px;text-align:center;color:#aaa;">📭 Aucun cours planifié pour la classe <strong>${classeCode}</strong></div>`;
                }

            } catch(err) {
                console.error(err);
                grid.innerHTML = `<div style="grid-column:1/-1;padding:50px;text-align:center;color:#c62828;">❌ Erreur : ${err.message}</div>`;
            }
        }

        loadEmploiDuTemps();
    </script>
</body>
</html>
