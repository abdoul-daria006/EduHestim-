<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analyse de Données - EduHestim</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
    <style>
        :root{--blue:#003d82;--dkblue:#002560;--red:#c1002a;--green:#2e7d32;--orange:#ff8f00;--purple:#7b1fa2;--teal:#00796b;--brown:#5d4037;--bg:#f0f2f5;}
        *{margin:0;padding:0;box-sizing:border-box;}
        body{font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;background:var(--bg);display:flex;min-height:100vh;}
        .sidebar{width:260px;background:linear-gradient(180deg,#003d82 0%,#002a5c 100%);color:white;position:fixed;height:100vh;display:flex;flex-direction:column;box-shadow:4px 0 10px rgba(0,0,0,.1);z-index:100;}
        .logo-section{padding:25px 20px;border-bottom:2px solid rgba(255,255,255,.1);display:flex;align-items:center;gap:12px;cursor:pointer;}
        .logo-img{width:45px;height:45px;background:white;border-radius:8px;}
        .logo-text{font-size:1.4em;font-weight:700;}
        .nav-menu{flex:1;padding:20px 0;overflow-y:auto;}
        .nav-item{padding:14px 20px;color:rgba(255,255,255,.7);cursor:pointer;transition:all .3s;font-size:.95em;}
        .nav-item:hover{background:rgba(255,255,255,.1);color:white;}
        .nav-item.active{background:var(--red);color:white;}
        .logout-btn{padding:15px 20px;background:var(--red);color:white;cursor:pointer;text-align:center;font-weight:600;margin:10px;border-radius:8px;}
        .logout-btn:hover{background:#a0001f;}
        .main-content{margin-left:260px;flex:1;display:flex;flex-direction:column;}
        .top-bar{background:white;padding:18px 35px;box-shadow:0 2px 8px rgba(0,0,0,.08);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:50;}
        .page-title{font-size:1.7em;color:var(--blue);font-weight:700;}
        .top-actions{display:flex;gap:12px;align-items:center;}
        .source-badge{padding:6px 14px;border-radius:20px;font-size:.82em;font-weight:600;}
        .badge-live{background:#e8f5e9;color:var(--green);border:1px solid var(--green);}
        .badge-excel{background:#fff3e0;color:var(--orange);border:1px solid var(--orange);}
        .btn-refresh{padding:9px 20px;background:var(--blue);color:white;border:none;border-radius:8px;cursor:pointer;font-weight:600;font-size:.88em;}
        .btn-refresh:hover{background:var(--dkblue);}
        .content{padding:28px 35px;}
        .source-tabs{display:flex;gap:10px;margin-bottom:26px;}
        .tab-btn{padding:10px 24px;border:2px solid #e0e0e0;background:white;border-radius:8px;cursor:pointer;font-weight:600;font-size:.9em;color:#666;transition:all .3s;}
        .tab-btn.active{border-color:var(--blue);background:var(--blue);color:white;}
        .tab-btn:hover:not(.active){border-color:var(--blue);color:var(--blue);}

        /* ── 7 KPI globaux ── */
        .kpi-global{display:grid;grid-template-columns:repeat(7,1fr);gap:12px;margin-bottom:30px;}
        .kpi-global-card{background:white;border-radius:12px;padding:16px 12px;box-shadow:0 2px 10px rgba(0,0,0,.07);text-align:center;border-top:4px solid transparent;transition:transform .2s;cursor:default;}
        .kpi-global-card:hover{transform:translateY(-3px);}
        .kpi-global-card.c1{border-top-color:var(--blue);}
        .kpi-global-card.c2{border-top-color:var(--red);}
        .kpi-global-card.c3{border-top-color:var(--orange);}
        .kpi-global-card.c4{border-top-color:var(--teal);}
        .kpi-global-card.c5{border-top-color:var(--purple);}
        .kpi-global-card.c6{border-top-color:var(--green);}
        .kpi-global-card.c7{border-top-color:var(--brown);}
        .kpi-global-icon{font-size:1.6em;margin-bottom:6px;}
        .kpi-global-val{font-size:1.4em;font-weight:800;line-height:1;color:var(--blue);}
        .kpi-global-val.red{color:var(--red);}
        .kpi-global-val.orange{color:var(--orange);}
        .kpi-global-val.teal{color:var(--teal);}
        .kpi-global-val.purple{color:var(--purple);}
        .kpi-global-val.green{color:var(--green);}
        .kpi-global-val.brown{color:var(--brown);}
        .kpi-global-label{font-size:.74em;color:#888;margin-top:5px;line-height:1.3;}
        .kpi-global-sub{font-size:.7em;color:#aaa;margin-top:3px;}

        /* ── Sections ── */
        .section-header{display:flex;align-items:center;gap:12px;margin:30px 0 16px;}
        .section-icon{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:1.1em;flex-shrink:0;}
        .icon-blue{background:#e3f2fd;}.icon-green{background:#e8f5e9;}.icon-red{background:#ffebee;}
        .icon-teal{background:#e0f2f1;}.icon-purple{background:#f3e5f5;}.icon-brown{background:#efebe9;}
        .section-title{font-size:1.15em;font-weight:700;color:var(--blue);}
        .section-sub{font-size:.8em;color:#888;margin-top:2px;}
        .section-divider{flex:1;height:2px;background:linear-gradient(90deg,#e0e0e0,transparent);}

        /* ── KPI cards internes ── */
        .kpi-row{display:grid;gap:12px;margin-bottom:16px;}
        .kpi-row-2{grid-template-columns:repeat(2,1fr);}
        .kpi-row-3{grid-template-columns:repeat(3,1fr);}
        .kpi-row-4{grid-template-columns:repeat(4,1fr);}
        .kpi-card{background:white;border-radius:10px;padding:14px 16px;box-shadow:0 2px 8px rgba(0,0,0,.07);display:flex;align-items:center;gap:12px;border-left:4px solid transparent;}
        .kpi-card.blue{border-left-color:var(--blue);}.kpi-card.red{border-left-color:var(--red);}
        .kpi-card.green{border-left-color:var(--green);}.kpi-card.orange{border-left-color:var(--orange);}
        .kpi-card.purple{border-left-color:var(--purple);}.kpi-card.teal{border-left-color:var(--teal);}
        .kpi-card.brown{border-left-color:var(--brown);}
        .kpi-icon{font-size:1.6em;}
        .kpi-val{font-size:1.6em;font-weight:700;color:var(--blue);line-height:1;}
        .kpi-label{font-size:.78em;color:#888;margin-top:3px;}

        /* ── Charts ── */
        .charts-2{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:18px;}
        .charts-3{display:grid;grid-template-columns:2fr 1fr;gap:18px;margin-bottom:18px;}
        .chart-card{background:white;border-radius:12px;padding:20px;box-shadow:0 2px 10px rgba(0,0,0,.07);}
        .chart-title{font-size:.92em;font-weight:700;color:var(--blue);margin-bottom:14px;display:flex;align-items:center;gap:8px;}
        .chart-title span{background:var(--bg);padding:3px 10px;border-radius:20px;font-size:.78em;color:#888;font-weight:500;}
        .chart-wrap{position:relative;}
        .chart-wrap.h300{height:300px;}.chart-wrap.h260{height:260px;}
        .chart-wrap.h220{height:220px;}.chart-wrap.h180{height:180px;}

        /* ── Heatmap ── */
        .heatmap-wrap{overflow-x:auto;}
        .heatmap-table{width:100%;border-collapse:collapse;font-size:.8em;}
        .heatmap-table th{background:var(--blue);color:white;padding:7px 8px;text-align:center;font-weight:600;}
        .heatmap-table td{padding:9px 6px;text-align:center;font-weight:700;border:2px solid white;}
        .heatmap-row-label{background:#f5f7fc;color:var(--blue);font-weight:600;text-align:left!important;padding:7px 10px!important;white-space:nowrap;}

        /* ── Top5 ── */
        .top5-list{display:flex;flex-direction:column;gap:10px;padding-top:4px;}
        .top5-item{display:flex;align-items:center;gap:10px;}
        .top5-rank{width:24px;height:24px;border-radius:50%;background:var(--blue);color:white;font-weight:700;font-size:.78em;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
        .top5-rank.gold{background:var(--orange);}
        .top5-bar-wrap{flex:1;}
        .top5-label{font-size:.8em;font-weight:600;color:#333;margin-bottom:3px;}
        .top5-bar-bg{background:#f0f0f0;border-radius:4px;height:7px;}
        .top5-bar-fill{height:7px;border-radius:4px;transition:width .5s;}
        .top5-count{font-size:.82em;font-weight:700;color:var(--blue);min-width:28px;text-align:right;}

        /* ── Synthèse ── */
        .synthese-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:14px;}
        .synthese-grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
        .synthese-card{border-radius:10px;padding:16px;}
        .synthese-card.s-blue{background:var(--blue);color:white;}
        .synthese-card.s-red{background:var(--red);color:white;}
        .synthese-card.s-green{background:var(--green);color:white;}
        .synthese-card.s-teal{background:var(--teal);color:white;}
        .synthese-card.s-purple{background:var(--purple);color:white;}
        .synthese-card.s-orange{background:var(--orange);color:white;}
        .synthese-card.s-brown{background:var(--brown);color:white;}
        .synthese-card h4{font-size:.88em;margin-bottom:10px;opacity:.9;}
        .synthese-item{font-size:.8em;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.2);display:flex;justify-content:space-between;gap:6px;}
        .synthese-item:last-child{border:none;padding-top:7px;font-style:italic;opacity:.85;}
        .synthese-val{font-weight:700;white-space:nowrap;}

        /* ── Loading / Error ── */
        .loading-overlay{display:flex;align-items:center;justify-content:center;padding:80px;color:#888;font-size:1em;gap:12px;}
        .spinner{width:22px;height:22px;border:3px solid #e0e0e0;border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;}
        @keyframes spin{to{transform:rotate(360deg);}}
        .error-box{background:#ffebee;color:var(--red);padding:16px;border-radius:8px;border-left:4px solid var(--red);}

        @media(max-width:1100px){
            .kpi-global{grid-template-columns:repeat(3,1fr);}
            .charts-2,.charts-3{grid-template-columns:1fr;}
            .kpi-row-4{grid-template-columns:repeat(2,1fr);}

</head>

<div class="main-content">

        </div>

    </div>
</div>

<script src="api.js"></script>
<script>
authSystem.requireAuth('administrateur');

const C = {
    blue:'#003d82',red:'#c1002a',green:'#2e7d32',orange:'#ff8f00',
    purple:'#7b1fa2',teal:'#00796b',brown:'#5d4037',
    multi:['#003d82','#c1002a','#2e7d32','#ff8f00','#7b1fa2','#00796b','#5d4037','#0288d1']
};
let src = 'live', cx = {};

function go(p){ window.location.href = p; }

function switchSource(s){
    src = s;
    document.getElementById('tabLive').classList.toggle('active', s==='live');
    document.getElementById('tabExcel').classList.toggle('active', s==='excel');
    document.getElementById('badgeLive').style.display  = s==='live'  ? '' : 'none';
    document.getElementById('badgeExcel').style.display = s==='excel' ? '' : 'none';
    loadAll();
}

function destroyAll(){ Object.values(cx).forEach(c=>{ try{c.destroy();}catch(e){} }); cx={}; }

async function loadAll(){
    destroyAll();
    document.getElementById('main').innerHTML = '<div class="loading-overlay"><div class="spinner"></div> Chargement des 7 KPIs...</div>';
    try {
        src === 'live' ? await loadLive() : renderAll(...fakerData());
    } catch(e) {
        document.getElementById('main').innerHTML = `<div class="error-box">❌ ${e.message}</div>`;
    }
}

function authH(){
    const t = localStorage.getItem('eduhestim_token');
    return { 'Content-Type':'application/json', 'Authorization': t ? `Bearer ${t}` : '' };
}

async function apiFetch(ep){
    const r = await fetch(`http://localhost:5000/api/analyse/${ep}`, { headers: authH() });
    if (!r.ok) throw new Error(`Erreur ${r.status} — /api/analyse/${ep}`);
    return r.json();
}

async function loadLive(){
    const [occ, vol, conf, cren, modif, dispo, spc] = await Promise.all([
        apiFetch('occupation'),
        apiFetch('volume-horaire'),
        apiFetch('conflits'),
        apiFetch('creneaux'),
        apiFetch('modifications'),
        apiFetch('disponibilite'),
        apiFetch('seances-par-classe'),
    ]);
    renderAll(occ, vol, conf, cren, modif, dispo, spc);
}

    return [occ, vol, conf, cren, modif, dispo, spc];
}

/* ─────────────────────────────────────────────────────────────
   DRAW CHARTS
───────────────────────────────────────────────────────────── */
function drawAll(occ, vol, conf, cren, modif, dispo, spc){
    const moy = occ.kpi.tauxMoyen, seuil = vol.kpi.seuil;
    const labCren = cren.labCren || {'08:00':'08h-10h','10:15':'10h15-12h15','14:00':'14h-16h','16:15':'16h15-18h15'};

    // AXE 1
    cx.t10 = new Chart(document.getElementById('cTop10'),{type:'bar',data:{
        labels:occ.top10.map(s=>s.nom),
        datasets:[{data:occ.top10.map(s=>s.taux),borderRadius:5,
            backgroundColor:occ.top10.map(s=>s.taux>=moy*1.3?C.red:s.taux>=moy?C.orange:C.blue)}]
    },options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.raw}%`}}},
        scales:{x:{ticks:{callback:v=>v+'%'}},y:{ticks:{font:{size:11}}}}}});

    cx.don = new Chart(document.getElementById('cDonut'),{type:'doughnut',data:{
        labels:Object.keys(occ.parType),
        datasets:[{data:Object.values(occ.parType),backgroundColor:C.multi,borderWidth:3,borderColor:'#fff'}]
    },options:{responsive:true,maintainAspectRatio:false,cutout:'60%',
        plugins:{legend:{position:'bottom',labels:{font:{size:11},padding:10}}}}});

    // AXE 2
    cx.t15 = new Chart(document.getElementById('cTop15'),{type:'bar',data:{
        labels:vol.top15.map(e=>e.nom),
        datasets:[{data:vol.top15.map(e=>e.vol),borderRadius:4,
            backgroundColor:vol.top15.map(e=>e.surcharge?C.red:C.blue)}]
    },options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.raw}h${c.raw>seuil?' ⚠️':''}`}}},
        scales:{x:{ticks:{callback:v=>v+'h'}},y:{ticks:{font:{size:10}}}}}});

    cx.dep = new Chart(document.getElementById('cDept'),{type:'bar',data:{
        labels:vol.parDept.map(d=>d.dept),
        datasets:[{data:vol.parDept.map(d=>d.moy),backgroundColor:C.multi,borderRadius:5}]
    },options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.raw}h`}}},
        scales:{x:{ticks:{font:{size:10},maxRotation:25}},y:{ticks:{callback:v=>v+'h'}}}}});

    // AXE 3
    const cTypes = Object.keys(conf.resParType);
    cx.ct = new Chart(document.getElementById('cConfTypes'),{type:'bar',data:{
        labels:cTypes.map(t=>t.length>20?t.substring(0,20)+'…':t),
        datasets:[
            {label:'Résolus',data:cTypes.map(t=>conf.resParType[t].r||0),backgroundColor:C.green,borderRadius:4},
            {label:'Non résolus',data:cTypes.map(t=>conf.resParType[t].nr||0),backgroundColor:C.red,borderRadius:4},
        ]
    },options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{position:'bottom',labels:{font:{size:11}}}},
        scales:{x:{ticks:{font:{size:10}}},y:{beginAtZero:true}}}});

    cx.res = new Chart(document.getElementById('cReso'),{type:'doughnut',data:{
        labels:['Résolus','Non résolus'],
        datasets:[{data:[conf.kpi.resolus,conf.kpi.nonResolus],
            backgroundColor:[C.green,C.red],borderWidth:3,borderColor:'#fff'}]
    },options:{responsive:true,maintainAspectRatio:false,cutout:'65%',
        plugins:{legend:{position:'bottom',labels:{font:{size:12},padding:12}}}}});

    cx.jou = new Chart(document.getElementById('cJour'),{type:'bar',data:{
        labels:Object.keys(conf.parJour),
        datasets:[{data:Object.values(conf.parJour),borderRadius:5,
            backgroundColor:Object.values(conf.parJour).map((v,i,a)=>v===Math.max(...a)?C.red:C.blue)}]
    },options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true}}}});

    cx.cre = new Chart(document.getElementById('cCreneau'),{type:'bar',data:{
        labels:Object.keys(conf.parCreneau).map(k=>labCren[k]||k),
        datasets:[{data:Object.values(conf.parCreneau),backgroundColor:[C.blue,C.orange,C.red,C.purple],borderRadius:5}]
    },options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true}}}});

    // AXE 4 — Heatmap
    const jours = ['Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
    const crens = ['08:00','10:15','14:00','16:15'];
    const hm    = cren.heatmap || {};
    let maxHm   = 0;
    jours.forEach(j=>crens.forEach(c=>{ if((hm[j]?.[c]||0)>maxHm) maxHm=hm[j][c]; }));
    function hmCol(v){
        const p=maxHm?v/maxHm:0;
        if(p>.8) return {bg:'#c1002a',txt:'white'};
        if(p>.6) return {bg:'#e65100',txt:'white'};
        if(p>.4) return {bg:'#ff8f00',txt:'white'};
        if(p>.2) return {bg:'#fff9c4',txt:'#333'};
        if(p>.05)return {bg:'#e8f5e9',txt:'#333'};
        return {bg:'#f5f5f5',txt:'#bbb'};
    }
    let hmHtml='<table class="heatmap-table"><thead><tr><th>Créneau</th>';
    jours.forEach(j=>hmHtml+=`<th>${j}</th>`);
    hmHtml+='</tr></thead><tbody>';
    crens.forEach(c=>{
        hmHtml+=`<tr><td class="heatmap-row-label">${labCren[c]||c}</td>`;
        jours.forEach(j=>{
            const v=hm[j]?.[c]||0,col=hmCol(v);
            hmHtml+=`<td style="background:${col.bg};color:${col.txt}" title="${j} ${labCren[c]||c}: ${v}">${v}</td>`;
        });
        hmHtml+='</tr>';
    });
    document.getElementById('heatmapWrap').innerHTML=hmHtml+'</tbody></table>';

    const top5=cren.top5||[], maxC=top5[0]?.count||1;
    document.getElementById('top5List').innerHTML=top5.map((it,i)=>`
        <div class="top5-item">
            <div class="top5-rank ${i===0?'gold':''}">${i+1}</div>
            <div class="top5-bar-wrap">
                <div class="top5-label">${it.label}</div>
                <div class="top5-bar-bg"><div class="top5-bar-fill" style="width:${Math.round(it.count/maxC*100)}%;background:${i===0?C.orange:C.blue}"></div></div>
            </div>
            <div class="top5-count">${it.count}</div>
        </div>`).join('');

    cx.crenDem=new Chart(document.getElementById('cCrenDem'),{type:'bar',data:{
        labels:Object.keys(cren.parCreneau).map(k=>labCren[k]||k),
        datasets:[{data:Object.values(cren.parCreneau),
            backgroundColor:Object.values(cren.parCreneau).map((v,i,a)=>v===Math.max(...a)?C.teal:C.blue),borderRadius:6}]
    },options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true}}}});

    cx.jourDem=new Chart(document.getElementById('cJourDem'),{type:'bar',data:{
        labels:Object.keys(cren.parJour),
        datasets:[{data:Object.values(cren.parJour),
            backgroundColor:Object.values(cren.parJour).map((v,i,a)=>v===Math.max(...a)?C.teal:C.blue),borderRadius:6}]
    },options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true}}}});

    // AXE 5
    cx.modifMois=new Chart(document.getElementById('cModifMois'),{type:'line',data:{
        labels:Object.keys(modif.parMois),
        datasets:[{label:'Modifications',data:Object.values(modif.parMois),
            borderColor:C.purple,backgroundColor:C.purple+'22',fill:true,tension:.4,
            pointRadius:5,pointBackgroundColor:C.purple,borderWidth:2}]
    },options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:true}}}});

    cx.modifType=new Chart(document.getElementById('cModifType'),{type:'doughnut',data:{
        labels:Object.keys(modif.parType),
        datasets:[{data:Object.values(modif.parType),backgroundColor:C.multi,borderWidth:3,borderColor:'#fff'}]
    },options:{responsive:true,maintainAspectRatio:false,cutout:'55%',
        plugins:{legend:{position:'bottom',labels:{font:{size:11},padding:8}}}}});

    // AXE 6 — Disponibilité
    cx.dispoBat=new Chart(document.getElementById('cDispoBat'),{type:'bar',data:{
        labels:dispo.batimentData.map(b=>b.batiment),
        datasets:[
            {label:'Disponibles',  data:dispo.batimentData.map(b=>b.dispo),  backgroundColor:C.green,borderRadius:5},
            {label:'Indisponibles',data:dispo.batimentData.map(b=>b.indispo),backgroundColor:C.red,  borderRadius:5},
        ]
    },options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{position:'bottom',labels:{font:{size:11}}}},
        scales:{x:{stacked:true,ticks:{font:{size:11}}},y:{stacked:true,beginAtZero:true}}}});

    cx.dispoDonut=new Chart(document.getElementById('cDispoDonut'),{type:'doughnut',data:{
        labels:['Disponibles','Indisponibles'],
        datasets:[{data:[dispo.kpi.disponibles,dispo.kpi.indisponibles],
            backgroundColor:[C.green,C.red],borderWidth:3,borderColor:'#fff'}]
    },options:{responsive:true,maintainAspectRatio:false,cutout:'60%',
        plugins:{legend:{position:'bottom',labels:{font:{size:12},padding:12}}}}});

    // AXE 7 — Séances par classe
    const spcMoy = spc.kpi.moyGlobale;
    cx.spcClasse=new Chart(document.getElementById('cSpcClasse'),{type:'bar',data:{
        labels:spc.parClasse.map(c=>c.nom),
        datasets:[{data:spc.parClasse.map(c=>c.nbSeances),borderRadius:5,
            backgroundColor:spc.parClasse.map(c=>c.nbSeances>spcMoy*1.2?C.brown:c.nbSeances<spcMoy*0.8?C.orange:C.blue)}]
    },options:{indexAxis:'y',responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.raw} séances`}}},
        scales:{x:{beginAtZero:true},y:{ticks:{font:{size:10}}}}}});

    cx.spcFiliere=new Chart(document.getElementById('cSpcFiliere'),{type:'bar',data:{
        labels:spc.parFiliere.map(f=>f.filiere),
        datasets:[{data:spc.parFiliere.map(f=>f.moy),backgroundColor:C.multi,borderRadius:6}]
    },options:{responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.raw} séances moy.`}}},
        scales:{x:{ticks:{font:{size:10},maxRotation:25}},y:{beginAtZero:true}}}});
}

loadAll();
</script>
</body>
</html>
